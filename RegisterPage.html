<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colorful Register Page</title>

<!-- Bootstrap 5 CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: url('https://images.unsplash.com/photo-1503264116251-35a269479413') no-repeat center center fixed;
    background-size: cover;
    min-height: 100vh;
    display: flex;
    align-items: center;
}

/* Glass Effect */
.glass-card {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.3);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

/* Label Color */
label {
    color: #fff;
    font-weight: 500;
}

/* Heading */
.form-title {
    color: #fff;
    font-weight: 700;
    letter-spacing: 1px;
}

/* Sky Blue Gradient Button */
.btn-gradient {
    background: linear-gradient(45deg, #00c6ff, #0072ff);
    border: none;
    color: white;
    font-weight: 600;
    transition: all 0.3s ease;
}

.btn-gradient:hover {
    background: linear-gradient(45deg, #0099ff, #005ce6);
    transform: scale(1.05);
    box-shadow: 0 8px 20px rgba(0, 123, 255, 0.5);
}
</style>

</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="card glass-card p-4">

                <h2 class="text-center mb-4 form-title">Create Your Account</h2>

                <form class="needs-validation" novalidate>

                    <!-- Name Row -->
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label>First Name</label>
                            <input type="text" class="form-control" required pattern="[A-Za-z]{2,}">
                            <div class="invalid-feedback">Enter valid first name.</div>
                        </div>

                        <div class="col-md-4">
                            <label>Middle Name</label>
                            <input type="text" class="form-control" pattern="[A-Za-z]*">
                            <div class="invalid-feedback">Only letters allowed.</div>
                        </div>

                        <div class="col-md-4">
                            <label>Last Name</label>
                            <input type="text" class="form-control" required pattern="[A-Za-z]{2,}">
                            <div class="invalid-feedback">Enter valid last name.</div>
                        </div>
                    </div>

                    <!-- Age & DOB -->
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label>Age</label>
                            <input type="number" class="form-control" required min="1" max="120">
                            <div class="invalid-feedback">Enter valid age.</div>
                        </div>

                        <div class="col-md-6">
                            <label>Date of Birth</label>
                            <input type="date" class="form-control" required>
                            <div class="invalid-feedback">Select your DOB.</div>
                        </div>
                    </div>

                    <!-- Contact -->
                    <div class="mb-3">
                        <label>Contact Number</label>
                        <input type="tel" class="form-control" required pattern="[0-9]{10}">
                        <div class="invalid-feedback">Enter valid 10-digit number.</div>
                    </div>

                    <!-- Gender -->
                    <div class="mb-3">
                        <label class="d-block">Gender</label>

                        <div class="form-check form-check-inline text-white">
                            <input class="form-check-input" type="radio" name="gender" required>
                            <label class="form-check-label">Male</label>
                        </div>

                        <div class="form-check form-check-inline text-white">
                            <input class="form-check-input" type="radio" name="gender" required>
                            <label class="form-check-label">Female</label>
                        </div>

                        <div class="form-check form-check-inline text-white">
                            <input class="form-check-input" type="radio" name="gender" required>
                            <label class="form-check-label">Other</label>
                        </div>
                    </div>

                    <!-- Image Upload -->
                    <div class="mb-4">
                        <label>Upload Profile Image</label>
                        <input type="file" class="form-control" accept="image/*" required>
                        <div class="invalid-feedback">Upload your image.</div>
                    </div>

                    <!-- Submit -->
                    <div class="d-grid">
                        <button class="btn btn-gradient btn-lg rounded-pill" type="submit">
                            Register Now
                        </button>
                    </div>

                </form>
            </div>

        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
(() => {
'use strict'
const forms = document.querySelectorAll('.needs-validation')
Array.from(forms).forEach(form => {
    form.addEventListener('submit', event => {
        if (!form.checkValidity()) {
            event.preventDefault()
            event.stopPropagation()
        }
        form.classList.add('was-validated')
    }, false)
})
})();
</script>

</body>
</html>
